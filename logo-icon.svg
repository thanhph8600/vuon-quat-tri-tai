<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 140" fill="none" role="img" aria-label="Vườn Quất Tri - Tài">
  <defs>
    <radialGradient id="i-fa" cx="35%" cy="28%" r="65%">
      <stop offset="0%"   stop-color="#FFE566"/>
      <stop offset="45%"  stop-color="#F97316"/>
      <stop offset="100%" stop-color="#B45309"/>
    </radialGradient>
    <radialGradient id="i-fb" cx="35%" cy="28%" r="65%">
      <stop offset="0%"   stop-color="#FDE68A"/>
      <stop offset="50%"  stop-color="#FB923C"/>
      <stop offset="100%" stop-color="#C2410C"/>
    </radialGradient>
    <radialGradient id="i-fc" cx="35%" cy="28%" r="65%">
      <stop offset="0%"   stop-color="#FEF9C3"/>
      <stop offset="55%"  stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#D97706"/>
    </radialGradient>
    <linearGradient id="i-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#166534"/>
      <stop offset="100%" stop-color="#14532D"/>
    </linearGradient>
    <filter id="i-fs" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#7C2D12" flood-opacity="0.45"/>
    </filter>
    <filter id="i-fg" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="5" stdDeviation="12" flood-color="#14532D" flood-opacity="0.28"/>
    </filter>
    <clipPath id="i-clip">
      <circle cx="70" cy="70" r="63"/>
    </clipPath>
  </defs>

  <!-- Vòng ngoài nhạt -->
  <circle cx="70" cy="70" r="68" fill="none"
          stroke="#BBF7D0" stroke-width="1.5" stroke-dasharray="4 3.5" opacity="0.7"/>

  <!-- Nền chính -->
  <circle cx="70" cy="70" r="63" fill="url(#i-bg)" filter="url(#i-fg)"/>

  <!-- Vòng trong mỏng -->
  <circle cx="70" cy="70" r="57" fill="none"
          stroke="rgba(255,255,255,0.1)" stroke-width="1.5"/>

  <g clip-path="url(#i-clip)">

    <!-- ── CÀNH ── -->
    <path d="M70 105 C68 91 60 78 56 64 C52 50 56 37 62 29"
          stroke="#E8F5E0" stroke-width="4.5" stroke-linecap="round" fill="none" opacity="0.9"/>
    <path d="M60 61 C69 55 82 50 93 44"
          stroke="#E8F5E0" stroke-width="3.5" stroke-linecap="round" fill="none" opacity="0.85"/>
    <path d="M56 75 C45 70 37 66 32 59"
          stroke="#D4EBC6" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.7"/>
    <path d="M62 29 C67 21 79 18 88 21"
          stroke="#D4EBC6" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.75"/>

    <!-- ── LÁ ── -->
    <ellipse cx="41" cy="63" rx="14" ry="7.5" fill="#4ADE80"
             transform="rotate(-35 41 63)" opacity="0.95"/>
    <line x1="33" y1="67" x2="50" y2="59" stroke="#16A34A" stroke-width="1.2" opacity="0.55"/>

    <ellipse cx="96" cy="40" rx="14" ry="7" fill="#86EFAC"
             transform="rotate(-45 96 40)" opacity="0.9"/>
    <line x1="89" y1="46" x2="103" y2="35" stroke="#22C55E" stroke-width="1.2" opacity="0.5"/>

    <ellipse cx="55" cy="22" rx="11" ry="6" fill="#4ADE80"
             transform="rotate(-55 55 22)" opacity="0.85"/>

    <ellipse cx="90" cy="20" rx="10" ry="5.5" fill="#86EFAC"
             transform="rotate(-28 90 20)" opacity="0.8"/>

    <ellipse cx="37" cy="56" rx="10" ry="5" fill="#22C55E"
             transform="rotate(-20 37 56)" opacity="0.75"/>

    <!-- ── QUẢ ── -->

    <!-- Quả lớn chính -->
    <g filter="url(#i-fs)">
      <circle cx="95" cy="57" r="16" fill="url(#i-fa)"/>
      <ellipse cx="88" cy="50" rx="5" ry="4" fill="white" opacity="0.3"
               transform="rotate(-20 88 50)"/>
      <path d="M91 41.5 Q95 38 99 41.5" stroke="#16A34A" stroke-width="2.5"
            stroke-linecap="round" fill="none"/>
    </g>

    <!-- Quả giữa -->
    <g filter="url(#i-fs)">
      <circle cx="49" cy="43" r="14" fill="url(#i-fb)"/>
      <ellipse cx="43" cy="37" rx="4.5" ry="3.5" fill="white" opacity="0.28"
               transform="rotate(-20 43 37)"/>
      <path d="M46 30 Q49 27 52 30" stroke="#16A34A" stroke-width="2.5"
            stroke-linecap="round" fill="none"/>
    </g>

    <!-- Quả nhỏ trên -->
    <g filter="url(#i-fs)">
      <circle cx="80" cy="25" r="12" fill="url(#i-fc)"/>
      <ellipse cx="74" cy="19" rx="3.5" ry="2.8" fill="white" opacity="0.26"
               transform="rotate(-15 74 19)"/>
      <path d="M77 14 Q80 11 83 14" stroke="#15803D" stroke-width="2.2"
            stroke-linecap="round" fill="none"/>
    </g>

    <!-- Đất / gốc -->
    <rect x="46" y="108" width="48" height="5" rx="2.5" fill="rgba(255,255,255,0.08)"/>
    <rect x="54" y="115" width="32" height="3.5" rx="1.75" fill="rgba(255,255,255,0.05)"/>
  </g>
</svg>
